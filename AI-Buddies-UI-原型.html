<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Buddies — 交互原型</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f6f5f0;--bg3:#eceae2;--text:#201f1d;--text2:#5f5e5a;--text3:#8d8c83;
  --border:#e7e5dd;--border2:#d6d4ca;
  --info-bg:#e6f1fb;--info:#185fa5;--warn-bg:#faeeda;--warn:#854f0b;--danger-bg:#fcebeb;--danger:#a32d2d;--success-bg:#eaf3de;--success:#3b6d11;
  --claude:#d85a30;--claude-d:#993c1d;--codex:#0f6e56;--codex-l:#1d9e75;
  --green:#1d9e75;--amber:#ba7517;--red:#e24b4a;--radius:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Segoe UI",system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#1e1d1b;--bg2:#272623;--bg3:#302e2a;--text:#f2f1ec;--text2:#b4b2a9;--text3:#8d8c83;
  --border:#3a3833;--border2:#4a4843;
  --info-bg:#0c2236;--info:#85b7eb;--warn-bg:#3a2a0e;--warn:#fac775;--danger-bg:#3a1414;--danger:#f09595;--success-bg:#1a2a0c;--success:#c0dd97;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg3);color:var(--text);font-family:var(--font);line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased}
.ic{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.ic svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.proto{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:9px 16px;flex-wrap:wrap}
.proto .brand{font-weight:500;display:flex;align-items:center;gap:8px}
.proto .seg{display:flex;background:var(--bg3);border-radius:var(--radius);padding:3px;gap:2px}
.proto .seg button{font-size:13px}
.seg button{border:0;background:transparent;color:var(--text2);padding:5px 11px;border-radius:6px;cursor:pointer;font-family:var(--font)}
.seg button.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 0 0 1px var(--border)}
.btn{border:1px solid var(--border2);background:var(--bg);color:var(--text);padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-family:var(--font);font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn:active{transform:scale(.98)}
.btn.pri{border-color:var(--info);color:var(--info)}
.iconbtn{border:0;background:transparent;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;display:inline-flex}
.iconbtn:hover{background:var(--bg3);color:var(--text)}
.wrap{max-width:1080px;margin:0 auto;padding:22px 16px 60px}
.surface{margin-bottom:34px;scroll-margin-top:64px}
.surface>h3{font-size:13px;font-weight:500;color:var(--text3);margin:0 0 10px;display:flex;align-items:center;gap:7px;text-transform:none}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px}
.muted{color:var(--text2)}
.badge{font-size:11px;padding:1px 7px;border-radius:var(--radius);display:inline-flex;align-items:center;gap:3px;font-weight:500}
.b-est{background:var(--bg3);color:var(--text2)}
.b-auth{background:var(--success-bg);color:var(--success)}
.b-danger{background:var(--danger-bg);color:var(--danger)}
.b-warn{background:var(--warn-bg);color:var(--warn)}
.b-info{background:var(--info-bg);color:var(--info)}
.num{font-size:22px;font-weight:500;line-height:1.1}
.track{flex:1;height:8px;background:var(--bg3);border-radius:var(--radius);overflow:hidden}
.track>span{display:block;height:100%}
.kpi{background:var(--bg2);border-radius:var(--radius);padding:11px 13px;cursor:pointer;border:1px solid transparent}
.kpi:hover{border-color:var(--border2)}
.kpi .l{font-size:12px;color:var(--text2)}
.row{display:flex;align-items:center;gap:10px}
/* menu bar */
.menubar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.menubar .top{display:flex;align-items:center;justify-content:flex-end;gap:14px;height:30px;padding:0 12px;background:var(--bg);border-bottom:1px solid var(--border);font-size:12.5px}
.statusitem{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 7px;border-radius:6px}
.statusitem:hover{background:var(--bg2)}
.desk{padding:14px;display:flex;justify-content:flex-end;min-height:30px;background:repeating-linear-gradient(0deg,var(--bg3),var(--bg3))}
.dropdown{width:340px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;position:relative}
.dd-sec{padding:12px 14px;border-bottom:1px solid var(--border)}
.popover{position:absolute;top:42px;right:10px;width:250px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:12px;z-index:5}
/* window */
.window{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg)}
.titlebar{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.dot{width:11px;height:11px;border-radius:50%}
.win-body{display:flex;min-height:380px}
.sidebar{width:140px;border-right:1px solid var(--border);padding:10px 8px;display:flex;flex-direction:column;gap:2px;background:var(--bg2)}
.navitem{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--radius);cursor:pointer;font-size:13.5px;color:var(--text2);border:0;background:transparent;width:100%;text-align:left;font-family:var(--font)}
.navitem:hover{background:var(--bg3)}
.navitem.on{background:var(--info-bg);color:var(--info);font-weight:500}
.main{flex:1;padding:15px;min-width:0}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.bars{display:flex;align-items:flex-end;gap:5px;height:100px}
.bars>div{flex:1;display:flex;flex-direction:column;justify-content:flex-end;cursor:default}
.mrow{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:3px 0}
.mrow .nm{width:140px;color:var(--text2)}
.listrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);cursor:pointer}
.listrow:hover{background:var(--bg2)}
.tip{display:flex;gap:9px;align-items:flex-start;font-size:13px;padding:3px 0}
/* phone */
.phone{width:288px;border:1px solid var(--border2);border-radius:30px;background:var(--bg);overflow:hidden;box-shadow:0 0 0 1px var(--border)}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:9px 20px 3px;font-size:12px}
.island{width:78px;height:17px;background:var(--text);opacity:.9;border-radius:10px}
.ios-body{padding:6px 16px 0}
.tabbar{display:flex;justify-content:space-around;padding:9px 0 12px;margin-top:10px;border-top:1px solid var(--border)}
.tabitem{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;border:0;background:transparent;font-family:var(--font)}
.tabitem.on{color:var(--info)}
.widget{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:12px;cursor:pointer}
.homescreen{background:var(--bg3);border-radius:var(--radius-lg);padding:18px;display:flex;gap:18px;flex-wrap:wrap}
select,input[type=number]{font-family:var(--font);font-size:13px;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.field{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.hint{font-size:12px;color:var(--text3)}
@media(max-width:680px){.grid4{grid-template-columns:repeat(2,1fr)}.sidebar{width:118px}.mrow .nm{width:96px}}
</style>

<div class="proto">
  <span class="brand"><span class="ic" style="width:20px;height:20px;color:var(--claude)" data-i="robot"></span>AI Buddies <span class="hint">交互原型</span></span>
  <div class="seg" style="margin-left:4px">
    <button data-act="nav" data-arg="s-menubar" class="on">Mac 菜单栏</button>
    <button data-act="nav" data-arg="s-dashboard">Mac 仪表盘</button>
    <button data-act="nav" data-arg="s-ios">iOS</button>
  </div>
  <button class="btn" data-act="theme" style="margin-left:auto"><span class="ic" style="width:16px;height:16px" data-i="bulb"></span><span id="themelbl">深色</span></button>
  <span class="hint">数据为示例 · 点任意按钮试试</span>
</div>

<div class="wrap">
  <section class="surface" id="s-menubar">
    <h3><span class="ic" style="width:15px;height:15px" data-i="gauge"></span> macOS · 菜单栏（点状态项开关下拉）</h3>
    <div class="menubar">
      <div class="top">
        <div class="statusitem" data-act="mb-toggle" id="mb-status"></div>
        <span class="muted ic" style="width:15px;height:15px" data-i="clock"></span><span class="muted">9:41</span>
      </div>
      <div class="desk"><div id="mb-dropdown"></div></div>
    </div>
  </section>

  <section class="surface" id="s-dashboard">
    <h3><span class="ic" style="width:15px;height:15px" data-i="window"></span> macOS · 仪表盘窗口（点左侧导航切换）</h3>
    <div class="window">
      <div class="titlebar">
        <span class="dot" style="background:#e24b4a"></span><span class="dot" style="background:#ef9f27"></span><span class="dot" style="background:#1d9e75"></span>
        <span class="muted" style="margin:0 auto;font-size:12.5px" id="dash-title">AI Buddies — 概览</span>
      </div>
      <div class="win-body">
        <div class="sidebar" id="dash-nav"></div>
        <div class="main" id="dash-main"></div>
      </div>
    </div>
  </section>

  <section class="surface" id="s-ios">
    <h3><span class="ic" style="width:15px;height:15px" data-i="mobile"></span> iOS · App（点底部标签切换）+ 小组件</h3>
    <div class="homescreen">
      <div class="phone">
        <div class="statusbar"><span style="font-weight:500">9:41</span><span class="island"></span><span class="muted">100%</span></div>
        <div class="ios-body" id="ios-screen"></div>
        <div class="tabbar" id="ios-tabs"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <h3 style="margin:0"><span class="ic" style="width:15px;height:15px" data-i="grid"></span> 主屏小组件（点开 App）</h3>
        <div id="widgets" style="display:flex;gap:12px;flex-wrap:wrap"></div>
        <h3 style="margin:4px 0 0"><span class="ic" style="width:15px;height:15px" data-i="lock"></span> 锁屏 / Watch</h3>
        <div id="lockwidgets" class="row" style="gap:14px"></div>
      </div>
    </div>
  </section>
</div>

<script>
const ICONS={
 robot:'<rect x="5" y="8" width="14" height="11" rx="2"/><path d="M12 4v4"/><circle cx="12" cy="4" r="1"/><path d="M9.5 13v1.5M14.5 13v1.5"/>',
 gauge:'<path d="M4 18a8 8 0 1 1 16 0"/><path d="M12 18l4-5"/>',
 window:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/>',
 mobile:'<rect x="7" y="3" width="10" height="18" rx="2"/><path d="M11 18h2"/>',
 grid:'<rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/>',
 lock:'<rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
 clock:'<circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/>',
 refresh:'<path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 5v6h-6"/>',
 settings:'<path d="M4 6h8"/><circle cx="15" cy="6" r="2"/><path d="M18 6h2"/><path d="M4 12h2"/><circle cx="9" cy="12" r="2"/><path d="M12 12h8"/><path d="M4 18h8"/><circle cx="15" cy="18" r="2"/><path d="M18 18h2"/>',
 close:'<path d="M6 6l12 12M18 6L6 18"/>',
 chevR:'<path d="M9 6l6 6-6 6"/>',
 bulb:'<path d="M9.5 18h5"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 1 4 10.5c-.6.6-1 1.4-1 2.5H9c0-1.1-.4-1.9-1-2.5A6 6 0 0 1 12 3z"/>',
 alert:'<path d="M12 4l9 16H3z"/><path d="M12 10v4"/><path d="M12 17h.01"/>',
 home:'<path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/>',
 chart:'<path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M21 20H3"/>',
 dash:'<rect x="4" y="4" width="7" height="9" rx="1"/><rect x="13" y="4" width="7" height="5" rx="1"/><rect x="13" y="12" width="7" height="8" rx="1"/><rect x="4" y="16" width="7" height="4" rx="1"/>',
 spark:'<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/>',
 code:'<path d="M9 8l-4 4 4 4"/><path d="M15 8l4 4-4 4"/>',
 folder:'<path d="M3 7a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/>',
 cpu:'<rect x="6" y="6" width="12" height="12" rx="1"/><path d="M9 3v3M15 3v3M9 18v3M15 18v3M3 9h3M3 15h3M18 9h3M18 15h3"/>',
 check:'<path d="M5 12l4 4 10-11"/>',
 dollar:'<path d="M12 3v18"/><path d="M16 7a4 3 0 0 0-4-2c-2 0-4 1-4 3s2 2.5 4 3 4 1 4 3-2 3-4 3a4 3 0 0 1-4-2"/>'
};
function ico(n,size,color){return '<span class="ic" style="width:'+(size||16)+'px;height:'+(size||16)+'px'+(color?';color:'+color:'')+'"><svg viewBox="0 0 24 24">'+(ICONS[n]||'')+'</svg></span>';}

function lvlColor(p){return p>=90?'var(--red)':p>=70?'var(--amber)':'var(--green)';}
function ring(p,size,sub){
 size=size||44;var c=lvlColor(p);
 var t=Math.round(p);
 return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="var(--border2)" stroke-width="3.4"/><circle cx="18" cy="18" r="16" fill="none" stroke="'+c+'" stroke-width="3.4" stroke-linecap="round" pathLength="100" stroke-dasharray="'+t+' 100" transform="rotate(-90 18 18)"/><text x="18" y="'+(sub?16:19.6)+'" text-anchor="middle" style="font-size:9.5px;font-weight:500;fill:var(--text)">'+t+'%</text>'+(sub?'<text x="18" y="24" text-anchor="middle" style="font-size:6.5px;fill:var(--text2)">'+sub+'</text>':'')+'</svg>';
}
function usd(n){return '$'+n.toFixed(2);}
function usd0(n){return '$'+Math.round(n);}
function tok(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n);}

const DATA={
 claude:{today:5.10,week:74.5,w5h:72,wWeek:58,wWeekReset:'5 天',tokens:{in:1100000,out:600000,cr:41000000,cw:4500000},calls:1284,
   sessions:[['myapp-api','opus',18.2],['web-frontend','sonnet',9.6],['infra','sonnet',5.1]]},
 codex:{today:1.30,week:11.9,w5h:86,w5hReset:'58 分',wWeek:41,wWeekReset:'4.6 天',tokens:{in:700000,out:300000,cr:50000},sessions:1,
   sess:[['rollout-9af2…','gpt-5-codex',6.4],['rollout-1c7d…','gpt-5-codex',3.1],['rollout-77b0…','gpt-5-codex',2.4]]},
 daily:[[3,1],[5,1.5],[2,.5],[6,2],[4,1],[7,1.5],[5,1],[8,2],[4,1.5],[6,1],[9,2],[5,1],[7,1.5],[6,1.3]],
 models:[['claude / sonnet','claude',41.0,30000000],['claude / opus','claude',33.5,14000000],['codex / gpt-5-codex','codex',11.9,1050000]],
 projects:[['myapp-api','claude',38,21000000,['opus','sonnet']],['web-frontend','claude',22,15000000,['sonnet']],['infra','claude',14,9000000,['sonnet']],['scripts','codex',9,800000,['gpt-5-codex']],['docs','claude',3.4,2200000,['haiku']]],
 tips:[
  {k:'danger',c:'防限流',t:'Codex 5 小时额度已用 86%，约 58 分钟后重置 — 先合并 / 暂缓重任务。'},
  {k:'warn',c:'省钱',t:'12 次 Opus 调用输出很短（小任务）。这类任务换 Sonnet / Haiku，成本可降约 5×。'},
  {k:'warn',c:'省钱',t:'Claude 缓存读取占比仅 22%。固定 CLAUDE.md、复用稳定上下文可大幅省输入成本。'},
  {k:'info',c:'价值',t:'本周 Claude 等效用量 ≈ $74.5（折月 ≈ $319），约为 $200 订阅的 1.6× 价值。'},
  {k:'success',c:'做得好',t:'Codex 每周额度才用 41%，节奏健康，关键任务有余量。'}
 ],
 plan:{claudeTier:'Max 20x ($200)',codexTier:'Pro'},
};
const state={theme:(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light',
 ddOpen:true,popover:false,menubarShow:'pct',dashPanel:'overview',range:14,project:null,iosScreen:'home',iosPeriod:'today'};

/* ---------- menu bar ---------- */
function renderStatus(){
 var c=DATA.claude.w5h,x=DATA.codex.w5h;
 var s=state.menubarShow;
 var txt = s==='pct'
   ? '<span style="color:var(--text)">C '+c+'%</span> · <span style="color:var(--text)">X '+x+'%</span>'
   : '<span style="color:var(--text)">今日 '+usd(DATA.claude.today+DATA.codex.today)+'</span>';
 var warn = (c>=90||x>=90)?ico('alert',15,'var(--red)'):(c>=70||x>=70)?ico('alert',15,'var(--amber)'):'';
 document.getElementById('mb-status').innerHTML=ico('gauge',15,'var(--text2)')+'<span style="font-size:12.5px">'+txt+'</span>'+warn;
}
function provBlock(prov){
 var d=DATA[prov],isC=prov==='claude';
 var name=isC?'Claude Code':'Codex',color=isC?'var(--claude)':'var(--codex)';
 var badge=isC?'<span class="badge b-est">估算</span>':'<span class="badge b-auth">'+ico('check',11)+'权威</span>';
 var r1sub=isC?'~3.2k tok':(d.w5hReset+'后');
 var r2sub=(d.wWeekReset+'后重置');
 return '<div class="dd-sec" data-act="mb-prov" data-arg="'+prov+'" style="cursor:pointer">'
  +'<div class="row" style="margin-bottom:10px"><span class="dot" style="width:8px;height:8px;background:'+color+'"></span><span style="font-weight:500">'+name+'</span>'+badge
  +'<span class="muted" style="margin-left:auto;font-size:13px">今日 ≈ '+usd(d.today)+'</span></div>'
  +'<div class="row" style="gap:18px">'
   +'<div class="row" style="gap:8px">'+ring(d.w5h,44)+'<div style="font-size:12px"><div class="muted">5 小时</div><div class="muted">'+r1sub+'</div></div></div>'
   +'<div class="row" style="gap:8px">'+ring(d.wWeek,44)+'<div style="font-size:12px"><div class="muted">每周</div><div class="muted">'+r2sub+'</div></div></div>'
  +'</div></div>';
}
function renderDropdown(){
 var el=document.getElementById('mb-dropdown');
 if(!state.ddOpen){el.innerHTML='';return;}
 var top=DATA.tips[0];
 el.innerHTML='<div class="dropdown">'
  +'<div class="dd-sec row" style="justify-content:space-between"><span class="row" style="font-weight:500;gap:7px">'+ico('robot',18,'var(--claude)')+' AI Buddies</span>'
   +'<span class="row" style="gap:4px"><button class="iconbtn" data-act="mb-refresh" aria-label="刷新">'+ico('refresh',17)+'</button><button class="iconbtn" data-act="mb-settings" aria-label="设置">'+ico('settings',17)+'</button></span></div>'
  +provBlock('claude')+provBlock('codex')
  +'<div class="dd-sec" style="background:var(--warn-bg);display:flex;gap:8px;align-items:flex-start"><span style="color:var(--warn)">'+ico('bulb',16)+'</span><span style="font-size:12.5px;color:var(--warn)">'+top.t+'</span></div>'
  +'<div class="dd-sec row" style="justify-content:space-between;border-bottom:0;cursor:pointer" data-act="mb-open"><span class="row" style="gap:6px;color:var(--info)">'+ico('dash',16)+'打开仪表盘</span><span class="muted" style="font-size:12px">⌘D <span id="mb-updated"></span></span></div>'
  +(state.popover?popover():'')
  +'</div>';
 setUpdated();
}
function popover(){

 switch(act){
  case 'nav':document.querySelectorAll('.proto .seg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-arg')===arg);});scrollTo(arg);break;
  case 'theme':state.theme=state.theme==='dark'?'light':'dark';applyTheme();break;
  case 'mb-toggle':state.ddOpen=!state.ddOpen;renderDropdown();break;
  case 'mb-refresh':renderDropdown();var b=el;break;
  case 'mb-settings':state.popover=!state.popover;renderDropdown();break;
  case 'mb-open':document.querySelectorAll('.proto .seg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-arg')==='s-dashboard');});scrollTo('s-dashboard');break;
  case 'mb-prov':state.dashPanel=arg;renderDash();scrollTo('s-dashboard');break;
  case 'dash-panel':state.project=null;state.dashPanel=arg;renderDash();break;
  case 'dash-range':state.range=parseInt(arg);renderDash();break;
  case 'dash-project':state.dashPanel='projects';state.project=arg;renderDash();break;
  case 'dash-back':state.project=null;renderDash();break;
  case 'ios-tab':state.iosScreen=arg;renderIOS();break;
  case 'ios-period':state.iosPeriod=arg;renderIOS();break;
  case 'set-mb':state.menubarShow=arg;renderStatus();renderDropdown();renderDash();break;
  case 'set-ios':state.iosPeriod=arg;renderIOS();break;
  case 'widget':document.querySelectorAll('.proto .seg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-arg')==='s-ios');});scrollTo('s-ios');break;
 }
});
/* boot */
document.querySelectorAll('[data-i]').forEach(function(s){var n=s.getAttribute('data-i');s.innerHTML='<svg viewBox="0 0 24 24">'+(ICONS[n]||'')+'</svg>';});
applyTheme();renderStatus();renderDropdown();renderDash();renderIOS();renderWidgets();
</script>
